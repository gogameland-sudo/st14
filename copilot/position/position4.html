<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>position4</title>
  <style>
    *{margin: 0; padding: 0;}
    ol,ul{list-style: none;}

    .wrap{
      background-color: beige;
      margin: 30px;
    }

    /* 상품카드 썸네일 */
    .ec-base-product{

    }
    .ec-base-product .prdList{
      background-color: #333;
      border: 1px solid #f00;
    }
    /* float 단처리 레이아웃 */
    /* float가 지정된 자식요소를 인식하지 못하는 문제 해결 */
    .ec-base-product .prdList::after{
      content: "";
      display: block;
      clear: both;
    }
    .prdList li{
      /* 1줄에 4단 상품 표시 */
      float: left;
      width: 25%;
      box-sizing: border-box;
      background-color: #cc0; /*테스트 후 삭제*/
      border: 1px solid #000; /*테스트 후 삭제*/
    }  
    .prdList li .prdList__item{
      position: relative;
    }  
    .prdList li .prdList__item .thumbnail{}  
    .prdList li .prdList__item .thumbnail img{
      opacity: 0.5; /*테스트 후 삭제*/
      /* 이미지를  자신의 부모의 크기에 맞게 자동 조절되게 하고 싶어요 */
      /* 이미지가 부모의 콘텐츠 너비를 다 사용 */
      /* 이미지가 부모의 콘텐츠 너비에 맞게 자동 조절 */
      width: 100%;
      display: block;
    }  
    /* 상품아이템의 오른쪽 위 배치 */
    .prdList li .prdList__item .thumbnail .sale_box{
      position: absolute;
      right: 5px; top: 5px;
    }  
    /* 상품아이템의 왼쪽 위 배치 */
    .prdList li .prdList__item .thumbnail .likeButton{
      position: absolute;
      left: 5px; top: 5px;
    }  
    
  </style>

</head>
