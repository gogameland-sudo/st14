<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex에서 margin활용</title>
  <link rel="stylesheet" href="..//reset.css">
  <style>
    .container{
      background-color: #ccc;
      width: 100%; height: 100vh;

      display: flex;
      justify-content: flex-start;
      /* 
      교차축 align-items: stretch; 
      교차크기(아이템의 width, height): auto;
      */
    }
    .item{
      /* width: 100px; height: 100px; */
      background-color: magenta;
      width: 100px;
      /* flex item이 stretch일 경우 부모의 크기만큼 늘어나라를 제외하고는 내 내용크기가 기본값 */
      /* height: auto; */
      height: 100px;
      margin: auto;
      /* 플렉스 컨테이너의 남은 공간을 활용 */
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="item">아이템</div>
    <!-- <div class="item">아이템</div> -->
  </div>
</body>
</html>
