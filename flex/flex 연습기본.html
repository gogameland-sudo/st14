<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex3-container</title>
  <link rel="stylesheet" href="../reset.css">
    <!-- 
  1. flex 선언
  2. flex 방향을 결정
  3. 아이템의 축소/확정을 결정
  4. 아이템의 크기 결정
  5. 아이템의 줄바꿈을 결정 
  6. 여백 관리 gap
  7. 정렬 container / item , margin
  -->
  <style>
    .wrap{margin: 50px;}
    .container{
      background-color: #fcc;
    }
    .item{
      border: 1px solid #000;
    }

    .flex{
      display: flex;
    }
    .flex .item{}

  </style>
</head>
<body>
  <div class="wrap">
    <div class="container flex">
      <div class="item">item1</div>
      <div class="item">item2</div>
      <div class="item">item3</div>
      <div class="item">item4</div>
    </div>
  </div>
</body>
</html>
