<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex실습1-오른쪽아래</title>
  <link rel="stylesheet" href="../reset.css">
  <style>
    .visul-section{
      display: flex;
      background-color: #ccc;
      /* viewport를 가득 채운 visual-section */
      box-sizing: border-box;
      width: 100%;   /* 스크롤바를 제외한 크기 */
      height: 100vh;
      /* 2 방향 */
      /* 5 줄바꿈 */
      /* 6 여백 */
      /* 7 정렬 */
      /* justify-content: center;
      align-items: center; */
      justify-content: right;
      align-items: flex-end;
      background-image: url(../CSS/images/background-test.jpg);
      background-repeat: no-repeat;
      background-position: 0 0;
      background-size: auto 150%;

    }
    .visul-section .text-wrap{
      /* flex item */
      background-color: #cff;
      /* 3 확장/축소 */
      /* flex-grow: 0; */
      /* flex-shrink: 1; */
      flex-basis: none;
      width: 50%;
      min-width: 300px;
      max-width: 500px;
      box-sizing: border-box;
      padding: 1rem 2rem;
      margin-right: 100px;
      margin-bottom: 100px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="visul-section">
      <div class="text-wrap">
        <div class="title">Title</div>
        <div class="desc">Lorem ipsum dolor sit amet consectetur adipisicing elit. Aliquam tempora rerum dolores magni culpa autem ex error, officiis quisquam at!</div>
      </div>
    </div>
  </div>
</body>
</html>
