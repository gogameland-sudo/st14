<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가상클래스 hover</title>
  <style>
    *{margin: 0; padding: 0;}
    body{
      margin: 30px;
    }
    .product , .product>div{
      box-sizing: border-box;
    }
    .product{
      width: 300px;
      padding: 30px;
      background-color: #ccc;
      margin-bottom: 30px;
    }
    /* 자식의 수평크기는 부모의 콘텐츠 영역의 크기 */
    .product .thumb{
      background-color: #f68;
      min-height: 200px;
      margin-bottom: 30px;
    }
    .product .desc{
      background-color: #68f;
    }

    .product:hover .thumb{
      box-shadow: 0px 0px 20px rgba(102, 102, 102, 1);
    }
    /* 가상클래스는 웹에서 자주 발생하는 상태를 선택자: 
    마우스를 요소 위치시키면 : hover
    동작
      상품이미지에 그림자 표시
      상품이미지 ,thumb
      그림자 표시 box-shadow */
  </style>
</head>
<body>
  <!-- ul>li.product>div.thumb+div.desc -->
  <ul>
    <li class="product">
      <div class="thumb">이미지</div>
      <div class="desc">상품설명</div>
    </li>
    <li class="product">
      <div class="thumb">이미지</div>
      <div class="desc">상품설명</div>
    </li>
  </ul>
</body>
</html>
