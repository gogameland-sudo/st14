<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오로라 그라디언트</title>
    <style>
        .exam {
            width: 100%;
            height: 100vh;
            background: 
                radial-gradient(circle at 20% 50%, cyan 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, purple 0%, transparent 50%),
                radial-gradient(circle at 50% 20%, #e7ca0e 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, magenta 0%, transparent 50%);
            position: relative;
        }
        .text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 2em;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="exam">
        <div class="text">여기에 텍스트를 입력하세요</div>
    </div>
</body>
</html>
