<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>table3</title>
  <style>
    *{margin: 0; padding: 0;}
    body{margin: 50px;}
    table{
      margin-bottom: 20px;
    }
    table, tr, th, td{
      box-sizing: border-box;
    }
    .table th,  
    .table td{
      border-bottom: 1px solid #000 ;
    } 
    /* table1 */
    .table1{
      table-layout: auto;
      border-collapse: collapse; 
      width: 100%;
    }
    .talble1 th:first-child, 
    .talble1 td:first-child{
      border-left:1px solid #000;
    }
    .talble1 th:last-child,
    .talble1 td:last-child{
      border-right: 1px solid #000;
    }
    .table1 tr:first-child th{
      border-left-color: #000;
      color: #fff;
      font-weight: bold;
      font-size: 1.5rem;
      padding: 0.5rem 1rem;
    }
    .table1 td{
      padding: 0.5rem 1rem;
    }

    /* table2 */
    .table2{
      table-layout: fixed;
      border-collapse: collapse; 
      width: 100%;
      border-top: 4px solid #000
    }
    /* 선, 배경 */
    .table2 th,
    .table2 td{
      border-bottom: 1px solid #000;
      border-right: 1px solid #000;
      padding: 0.5rem 1rem;
    }
    .table2 th:last-child,
    .table2 td:last-child{
      border-right: none;
    }

    /* 크기 */
    .table2 th:nth-child(1),
    .table2 td:nth-child(1){
      width: 150px;
    }
    .table2 th:nth-child(2),
    .table2 td:nth-child(2){
      width: 600px;
    }

    /* 수직정렬 */
    .table2 
    th:last-child,
    td:first-child{
      vertical-align: top;
    }
    .table2 
    th:last-child,
    td:nth-last-child(2){
      vertical-align: middle;
    }
    .table2 
    th:last-child, 
    td:nth-last-child(1){
      vertical-align: bottom;
    }

      

  </style>
</head>
<body>
  <table class="table1">
    <!-- tr>th*4>{제목$} -->
    <tr>
      <th>제목1</th>
      <th>제목2</th>
      <th>제목3</th>
      <th>제목4</th>
    </tr>
    <!-- tr*2>td*4>{내용$} -->
    <tr>
      <td>Lorem, ipsum.</td>
      <td>Lorem, ipsum.</td>
      <td>Lorem, ipsum dolor.</td>
      <td>내용3</td>
      <td>내용4</td>
    </tr>
    <tr>
      <td>내용1</td>
      <td>Lorem ipsum dolor</td>
      <td>내용3</td>
      <td>내용4</td>
    </tr>
  </table>
  <table class="table2">
    <!-- tr>th*4>{제목$} -->
    <tr>
      <th>제목1</th>
      <th>제목2</th>
      <th>제목3</th>
      <th>제목4</th>
    </tr>
    <!-- tr*2>td*4>{내용$} -->
    <tr>
      <td>Lorem, ipsum dolor.</td>
      <td>Lorem, ipsum.</td>
      <td>내용3</td>
      <td>내용4</td>
    </tr>
    <tr>
      <td>내용1</td>
      <td>Lorem ipsum dolor, sit</td>
      <td>내용3</td>
      <td>내용4</td>
    </tr>
  </table>
</body>
</html>
