<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>border-radius2</title>
  <style>
    *{margin: o; padding: 0;}
    body{
      margin: 50px;
    }
    .box{
      width: 300px;
      height: 400px;
      border: 1px solid #000;
      border-radius: 50px;
      overflow: hidden;
    }
    .child{
      background-color: rgba(88, 175, 111, 0.5);
      height: 100%;
    }
    /* 
    자식의 크기가 부모크기가 넘쳐날 때 
    overflow */
  </style>
</head>
<body>
  <div class="box">
    <div class="child">Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptatibus quidem rerum fugiat placeat non aliquam earum quos, minus nihil velit!</div>
  </div>
</body>
</html>
