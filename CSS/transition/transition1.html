<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>transition1</title>
  <style>
    *{margin: 0; padding: 0; box-sizing: border-box;}
    body{margin: 50;}
    .exam-wrap{
      background-color: #3cc;
      border: 1px solid #000;
      padding: 30px;
    }
    .img-wrap{
      background: beige;
      border: 1px solid #f00;
      width: 300px;
      overflow: hidden;
    }
    .img-wrap img{
      /* opacity: 0.5; */
      width: 100%;
      height: auto;
      display: block;
    }
    .img-wrap:hover img{
      transform: scale(1.5);
      transform-origin: center top ;
      /* transition 속성지정 */
      transition-duration: 0.5s;
      transition-property: transform;
    }
  </style>
</head>
<body>
  <div class="exam-wrap">
    <div class="img-wrap">
      <img src="/CSS/images/testimg.png" alt="">
    </div>
  </div>
</body>
</html>
