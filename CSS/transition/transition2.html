<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>transition2</title>
  <style>
    *{margin: 0; padding: 0; }
    body{margin: 100px;}
    
    .box{
      color: magenta;
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 3px;
      background-color: #6f8;
      text-align: center;
    }
    
    .box:hover{
      color: cyan;
      font-size: 5rem;
      font-weight: 400;
      letter-spacing: 10px;
      background-color: #f78;
      text-align: right;
      /* transition: font-size 0.3s, font-weight 0.3s; */
      transition: all 0.3s;
    }

  </style>
</head>
<body>
  <div class="box">
    SALE
  </div>
</body>
</html>
